# Fleet-level configuration consumed by the operator dashboard.
fleet:
  robots:
    - config: robot1.yaml
    - config: robot2.yaml
    - config: robot3.yaml
  default_robot: robot2

dashboard:
  drive_stream_hz: 10          # held-key command rate (feeds gateway deadman)
  speed_min_mps: 0.10
  speed_max_mps: 0.30
  speed_default_mps: 0.15
  turn_rate_rps: 0.5
  models_dir: ../models        # relative to dashboard_qt/
  # fire.pt measured strongest on real fire photos (28-37% conf, clean
  # detections); yolov8n-fire.pt (dual-head, also COCO objects) scored
  # 13-20% with noise — selectable in the toolbar when COCO classes matter.
  default_model: fire.pt
  # Operator decision 2026-06-11: night-room testing produced false alarms
  # at 26-39%, so the alarm gate was raised to 0.80 on request. BE AWARE:
  # fire.pt's measured confidence on REAL fire photos is 28-37% — at 0.80
  # the audible alarm will essentially never trigger with this model; the
  # detections table still lists everything the model sees, and F9 drills
  # the alarm UX. The real fix for the 26-39% overlap between real fire
  # and false positives is a better-trained model, not a threshold.
  fire_conf_min: 0.80

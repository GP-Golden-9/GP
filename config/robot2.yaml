# Robot 2 "Beta" — the Intervener (Pi 3B+ + Mega + GY-87 + camera + pump + arm)
robot:
  id: robot2
  name: Beta
  host: robot2.local
  kind: ros
  user: muc            # SSH user (console diagnostics / shutdown)

ros:
  domain_id: 12
  rosbridge_port: 9090

serial:
  port: /dev/mega
  baud: 115200

zmq:
  telemetry: 5556
  map: 5557              # robot2 publishes no map; port reserved for symmetry
  cmd: 5558
  health: 5559
  video: 5560

camera:
  device: 0
  width: 640
  height: 480
  fps: 15                # Pi 3B+ headroom; 30 was saturating one core
  jpeg_quality: 35
  legacy_port: 5555      # raw-JPEG channel kept for the tmux fallback
                         # streamer compatibility; set to 0 to disable

# Measured chassis (team, 2026-06-11): 30 cm long x 20 cm wide.
# (Reported "axle height 2.0-2.5 cm" must be chassis GROUND CLEARANCE —
# an 85 mm wheel puts its axle at 42.5 mm by geometry. Only the rolling
# diameter matters for odometry.)
footprint:
  length_m: 0.30
  width_m: 0.20
  forward_extent_m: 0.15   # body center → front edge (no onboard lidar)
  rear_extent_m: 0.15
  half_width_m: 0.10

drive:
  # Measured 2026-06-11 — the old 0.065 under-read every distance by 24%.
  wheel_diameter_m: 0.085
  # 25GA370 spec sheet (docs/design_notes/ wheel-odometry fusion doc):
  # 12 PPR × 34:1 gearbox = 408 counts/wheel-rev at 1× decoding — exactly
  # what the firmware ISR counts (RISING on channel A only). The old 330
  # was an empirical pair with the wrong 65 mm wheel; together they nearly
  # cancelled, separately each is wrong.
  ticks_per_rev: 408
  # Wheel CONTACT-CENTER spacing, estimated: 0.20 m chassis + one wheel
  # width. CALIBRATE: command a 360° pivot; if the robot over-rotates,
  # the value is too small (raise it), under-rotates → lower it.
  wheel_base_m: 0.225
  encoder_heading_weight: 0.3
  max_linear_mps: 0.5
  # Skid-steer pivots scrub four wheels sideways — they need MORE torque
  # than driving. Below ~180 PWM the motors stall-judder ("suffering").
  turn_pwm: 215
  # Verified 2026-06-11 (direct-serial test): PWM 255 moves hard, but the
  # old 80..255 mapping put the console's DEFAULT speed at ~PWM 132 —
  # below static friction, robot didn't move at all. Drive PWM now maps
  # min_pwm..255 so every slider position actually produces motion.
  min_pwm: 150
  deadman_timeout_s: 0.8
  keepalive_period_s: 0.3
  # Slip gate (carpet): when encoder-implied rotation disagrees with the
  # gyro by more than this, the wheels are scrubbing — odometry takes the
  # gyro for heading and discounts the distance estimate. 0.6 rad/s sits
  # well above gyro bias AND above the error a mis-calibrated wheel_base
  # produces at full pivot rate, so it only fires on genuine slip.
  slip_gate_rad_s: 0.6
  # PWM slew limit (soft launch). Stepping straight to min_pwm 150 /
  # turn_pwm 215 from rest is the torque kick that breaks traction on
  # carpet in the first place. 600/s ramps a dead-stop launch to full
  # PWM in ~175 ms — imperceptible lag, much less wheelspin. Downward
  # changes (slowing, stopping) are NEVER ramped.
  ramp_pwm_per_s: 600

goto:
  goal_tolerance_m: 0.12
  angle_tolerance_rad: 0.15
  max_linear_mps: 0.15
  max_angular_rps: 0.40
  kp_distance: 0.5
  kp_angle: 1.2

# Two forward-facing HC-SR04 ultrasonics (added 2026-06-13). Beta has no
# lidar, so these are its only real-time obstacle sense — they back-stop
# both manual driving and goto navigation against driving into a wall.
# Firmware reads them round-robin (pins below), median-filters, and appends
# them to the D: packet; the bridge publishes /ultrasonic/{left,right} and
# blocks forward motion under stop_cm; goto slows under slow_cm.
ultrasonic:
  enabled: true
  max_cm: 150          # firmware echo cap = bounds the blocking echo wait (~8.7 ms)
  stop_cm: 25          # forward HARD-STOP threshold (manual + auto)
  clear_cm: 40         # hysteresis: forward re-enabled only above this
  slow_cm: 60          # goto begins proportional slow-down here
  fov_deg: 15          # HC-SR04 beam width (for the Range message)
  # Mount offsets from base_link center (+x forward, +y left), for the
  # Range frame_ids and future map fusion. Sensors sit at the front edge.
  left_x_m:  0.15
  left_y_m:  0.07
  right_x_m: 0.15
  right_y_m: -0.07
  # Firmware pins (Mega) — documented here, defined in the .ino:
  #   LEFT  TRIG=30 ECHO=31    RIGHT TRIG=32 ECHO=33

accessories:
  pump:
    pin: 7               # firmware v5
    active_low: true     # relay module is H/L trigger — verify jumper
    max_run_ms: 5000     # firmware-enforced auto-off
    cooldown_ms: 1000
  servo:
    pin: 5
    min_deg: 10
    max_deg: 170
    slew_dps: 120
    home_deg: 90

slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping
    # Load relief for the Pi 4 (was 0.3 / 0.1 / 0.0 — every scan processed,
    # map republished ~3x/s; caused CPU saturation and map flicker/jumps):
    map_update_interval: 1.0
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.3
    transform_timeout: 0.5
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000
    enable_interactive_mode: false
    use_scan_matching: true
    use_scan_barycenter: true
    # No wheel odometry on robot1: scan matching estimates ALL motion.
    # heading 0.0 made EVERY scan pass the has-moved test, so identical
    # stationary scans were re-registered ~3x/s — CPU churn and speckle
    # noise in free space. 0.10 m / ~10 deg registers nodes only on real
    # motion: cleaner graph, crisper walls, far fewer phantom cells.
    minimum_travel_distance: 0.10
    minimum_travel_heading: 0.17
    map_start_pose: [0.0, 0.0, 0.0]
    map_start_at_dock: true

